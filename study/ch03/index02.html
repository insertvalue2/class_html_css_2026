<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box-px {
        width: 300px;
        background: #3b82f6;
        color: white;
        padding: 10px;
        margin: 5px;
      }
      .box-percent {
        width: 50%;
        background: #8b5cf6;
        color: white;
        padding: 10px;
        margin: 5px;
      }
      .box-vh {
        height: 30vh;
        background: #10b981;
        color: white;
        padding: 10px;
        margin: 5px;
      }
    </style>
  </head>
  <body>
    <div class="box-px">width: 300px (고정! 창 줄여도 안 변함)</div>
    <div class="box-percent">width: 50% (창 줄이면 같이 줄어듦)</div>
    <div class="box-vh">height: 30vh (화면 높이의 30%)</div>
  </body>
</html>
