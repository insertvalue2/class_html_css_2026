<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>테스트</title>
  </head>
  <body>
    <h1>Tenco 온라인에 오신걸 환경합니다</h1>
    <img id="sample-img" src="./img/sample.png" alt="샘플이미지" />
    <p style="color: blue">버튼을 눌러 메세지를 변경해 보세요</p>
    <button onclick="changeMessage()">메세지변경</button>
    <!-- 자바 스크립트 언어를 작성할 수 있느 스코프 -->
    <script>
      function changeMessage() {
        console.log("함수호출");
        // <img id="sample-img" src="./img/sample.png" alt="샘플이미지" />
        var img = document.getElementById("sample-img");
        if (img) {
          img.src = "./img/sample2.png";
        }
      }
    </script>
  </body>
</html>
