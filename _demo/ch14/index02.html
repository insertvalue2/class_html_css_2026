<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        height: 700px;
        display: flex;
        /* -------------- */
        flex-wrap: nowrap;
        flex-direction: column;
        /* 단축해서 지정할 수 있음 */
        flex-flow: row wrap;
        /* 가로에 줄자꿈 처리 속성  */

        /* 자식 요소 정렬 해보기 */
        /* 현재 주축 방향? --> row */
        justify-content: space-evenly;
        /* 교차축 방향 정렬 */
        align-items: end;

        border: 2px solid greenyellow;
        padding: 10px;
      }

      .item {
        width: 100px;
        height: 100px;
        background-color: aquamarine;
        margin: 5px;
        border: 2px solid black;
        border-radius: 10px;
        line-height: 100px;
        text-align: center;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item">1</div>
      <div class="item">2</div>
      <div class="item">3</div>
      <div class="item">4</div>
      <div class="item">5</div>
    </div>
  </body>
</html>
