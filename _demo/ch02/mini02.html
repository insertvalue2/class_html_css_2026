<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: #1b2748;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        padding-top: 50px;
      }
      h1 {
        font-size: 48px;
      }
      button {
        background-color: red;
        padding: 15px 30px;
        border: none;
        border-radius: 10px;
        color: white;
        cursor: pointer;
      }
      button:hover {
        background-color: blueviolet;
      }
    </style>
  </head>
  <body>
    <h1>나는 로봇</h1>
    <p>이름 : 코딩봇</p>
    <p>나이 : 1살</p>
    <button onclick="sayHello()">인사하기</button>
    <p id="message">텍스트컨텐츠</p>

    <script>
      let count = 0;
      function sayHello() {
        count++;
        const messageArr = [
          "안녕하세요! 반갑습니다",
          "또 눌렀네요 감사해요",
          "벌써 3번째 우리 친해지는 건가요",
          "저 좀 쉬어도 될까요...",
        ];

        let pTag = document.getElementById("message");
        const index = Math.min(count - 1, messageArr.length - 1);
        pTag.textContent = messageArr[index];
      }
    </script>
  </body>
</html>
